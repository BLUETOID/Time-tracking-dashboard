<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Rubik:300,400,500,600,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main class="container">
      <section class="left-section">
        <div class="user-detail">
          <img src="./images/image-jeremy.png" alt="Jeremy Robson" />
          <p>Report for</p>
          <h1 class="user-name">Jeremy<br />Robson</h1>
        </div>
        <nav class="duration">
          <button class="daily-btn" id="daily-btn">Daily</button>
          <button class="weekly-btn active" id="weekly-btn">Weekly</button>
          <button class="monthly-btn" id="monthly-btn">Monthly</button>
        </nav>
      </section>

      <section class="right-section">
        <div class="work activity">
          <div class="activity-header">
            <img src="./images/icon-work.svg" alt="work" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Work</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">32hrs</p>
              <p class="last-task">Last Week - 36hrs</p>
            </div>
          </div>
        </div>

        <div class="play activity">
          <div class="activity-header">
            <img src="./images/icon-play.svg" alt="play" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Play</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">10hrs</p>
              <p class="last-task">Last Week - 8hrs</p>
            </div>
          </div>
        </div>

        <div class="study activity">
          <div class="activity-header">
            <img src="./images/icon-study.svg" alt="study" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Study</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">4hrs</p>
              <p class="last-task">Last Week - 7hrs</p>
            </div>
          </div>
        </div>

        <div class="exercise activity">
          <div class="activity-header">
            <img src="./images/icon-exercise.svg" alt="exercise" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Exercise</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">4hrs</p>
              <p class="last-task">Last Week - 5hrs</p>
            </div>
          </div>
        </div>

        <div class="social activity">
          <div class="activity-header">
            <img src="./images/icon-social.svg" alt="social" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Social</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">5hrs</p>
              <p class="last-task">Last Week - 10hrs</p>
            </div>
          </div>
        </div>

        <div class="self-care activity">
          <div class="activity-header">
            <img src="./images/icon-self-care.svg" alt="self-care" />
          </div>
          <div class="activity-main">
            <div class="card-top">
              <p>Self Care</p>
              <img
                src="./images/icon-ellipsis.svg"
                alt="ellipsis"
                class="ellipsis"
              />
            </div>
            <div class="card-bottom">
              <p class="task-duration">2hrs</p>
              <p class="last-task">Last Week - 2hrs</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
